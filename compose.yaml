# Nimbus development backing services.
#
# Start backing services:
#   docker compose up -d
#
# Then run Nimbus with an external backend:
#   nimbus start --tenant-provider postgres --postgres-url "postgresql://nimbus:nimbus@localhost:5432/nimbus"
#   nimbus start --tenant-provider mysql --mysql-url "mysql://nimbus:nimbus@localhost:3306/nimbus"
#
# Or use nimbus compose:
#   nimbus compose up

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nimbus
      POSTGRES_PASSWORD: nimbus
      POSTGRES_DB: nimbus
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nimbus"]
      interval: 3s
      timeout: 2s
      retries: 10
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: nimbus
      MYSQL_USER: nimbus
      MYSQL_PASSWORD: nimbus
      MYSQL_DATABASE: nimbus
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "nimbus", "-pnimbus"]
      interval: 3s
      timeout: 2s
      retries: 10
    restart: unless-stopped

volumes:
  pgdata:
  mysqldata:
