# Local development configuration
# These settings optimize local build iteration speed.

# Use git CLI for fetching to avoid cargo's libgit2 failing on
# rusty_v8's large V8 submodules during dependency resolution.
[net]
git-fetch-with-cli = true

[env]
# Fork release tags keep upstream crate versions intact while selecting the
# locker-enabled prebuilt asset line explicitly.
RUSTY_V8_VERSION = "147.0.0-locker.2"

# Use lld linker on Linux for faster linking (install: apt install lld)
# Uncomment if you have lld installed:
# [target.x86_64-unknown-linux-gnu]
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]
#
# [target.aarch64-unknown-linux-gnu]
# rustflags = ["-C", "link-arg=-fuse-ld=lld"]

# Use local overrides file for personal settings
# Create .cargo/config.local.toml for machine-specific config
