# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
# Lint level for crates that have been marked as unmaintained
unmaintained = "workspace"
# Lint level for crates with unsound API
unsound = "all"
# Lint level for crates that have been yanked
yanked = "deny"

[licenses]
# Lint level for crates not explicitly allowed
unlicensed = "deny"
# Confidence threshold for license detection
confidence-threshold = 0.8
# List of accepted licenses
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "OpenSSL",
  "Zlib",
  "BSL-1.0",
  "CC0-1.0",
  "MPL-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-git = []
