# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
# Lint level for crates that have been marked as unmaintained
unmaintained = "workspace"
# Lint level for crates with unsound API
unsound = "all"
# Lint level for crates that have been yanked
yanked = "deny"
# `RUSTSEC-2026-0097` requires `rand`'s `log` + `thread_rng` features plus a
# custom `log` logger path. The remaining transitive `rand 0.8.5` lane in this
# workspace does not enable `log`, and Neovex uses `tracing_subscriber` rather
# than a custom `log::Log` implementation.
ignore = ["RUSTSEC-2026-0097"]

[licenses]
version = 2
# Confidence threshold for license detection
confidence-threshold = 0.8
# Workspace crates use the Neovex Community License (custom, not SPDX)
private = { ignore = true }
# All licenses are denied unless explicitly in the allow list
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Zlib",
  "BSL-1.0",
  "MPL-2.0",
  "CDLA-Permissive-2.0",
]

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-git = "deny"
unknown-registry = "deny"
allow-git = [
  "https://github.com/agentstation/deno_core",
  "https://github.com/agentstation/rusty_v8",
]
