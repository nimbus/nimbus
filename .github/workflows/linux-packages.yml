name: linux-packages

on:
  workflow_call:
    inputs:
      nimbus_version:
        description: "Nimbus release version or tag"
        required: true
        type: string
      nimbus_crun_version:
        description: "nimbus-crun release version or tag"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      nimbus_version:
        description: "Nimbus release version or tag (for example 0.1.10 or v0.1.10)"
        required: true
      nimbus_crun_version:
        description: "nimbus-crun release version or tag (defaults to packaging/linux-distribution-contract.env)"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Resolve Linux distribution contract
        id: contract
        shell: bash
        env:
          INPUT_NIMBUS_VERSION: ${{ inputs.nimbus_version }}
          INPUT_NIMBUS_CRUN_VERSION: ${{ inputs.nimbus_crun_version }}
        run: |
          set -euo pipefail
          source packaging/linux-distribution-contract.env

          nimbus_version="${INPUT_NIMBUS_VERSION#v}"
          nimbus_crun_version="${INPUT_NIMBUS_CRUN_VERSION:-}"
          if [[ -z "${nimbus_crun_version}" ]]; then
            nimbus_crun_version="${NIMBUS_CRUN_VERSION}"
          fi
          nimbus_crun_version="${nimbus_crun_version#v}"

          {
            echo "nimbus_version=${nimbus_version}"
            echo "nimbus_release_tag=v${nimbus_version}"
            echo "nimbus_crun_version=${nimbus_crun_version}"
            echo "nimbus_crun_release_tag=v${nimbus_crun_version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"

      - name: Install nFPM
        run: |
          GOBIN="${RUNNER_TEMP}/bin" go install github.com/goreleaser/nfpm/v2/cmd/nfpm@v2.45.0
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Download Nimbus release binary
        env:
          RELEASE_TAG: ${{ steps.contract.outputs.nimbus_release_tag }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist/input/nimbus
          case "${ARCH}" in
            amd64) archive="nimbus_linux_x86_64.tar.gz" ;;
            arm64) archive="nimbus_linux_arm64.tar.gz" ;;
            *) echo "unsupported architecture: ${ARCH}" >&2; exit 64 ;;
          esac
          curl --fail -sSL --retry 5 \
            -o "dist/input/${archive}" \
            "https://github.com/nimbus/nimbus/releases/download/${RELEASE_TAG}/${archive}"
          tar -xzf "dist/input/${archive}" -C dist/input/nimbus

      - name: Prove packaged Nimbus binary can exercise SQLCipher
        run: |
          mkdir -p "dist/sqlcipher-package-proof/${{ matrix.arch }}"
          bash scripts/verify-sqlcipher-proof.sh \
            --output-dir "dist/sqlcipher-package-proof/${{ matrix.arch }}" \
            packaged-binary dist/input/nimbus/nimbus

      - name: Upload SQLCipher package proof bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sqlcipher-package-proof-${{ matrix.arch }}
          path: dist/sqlcipher-package-proof/${{ matrix.arch }}
          if-no-files-found: ignore

      - name: Download nimbus-crun release binary
        env:
          RELEASE_TAG: ${{ steps.contract.outputs.nimbus_crun_release_tag }}
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p dist/input
          curl --fail -sSL --retry 5 \
            -o "dist/input/nimbus-crun" \
            "https://github.com/nimbus/nimbus-crun/releases/download/${RELEASE_TAG}/nimbus-crun-linux-${ARCH}"
          chmod 0755 dist/input/nimbus-crun

      - name: Build Linux package artifacts
        env:
          VERSION: ${{ steps.contract.outputs.nimbus_version }}
          CRUN_VERSION: ${{ steps.contract.outputs.nimbus_crun_version }}
          ARCH: ${{ matrix.arch }}
        run: |
          bash scripts/build-linux-release-packages.sh \
            --output-dir "dist/linux-packages/${ARCH}" \
            --nimbus-binary "dist/input/nimbus/nimbus" \
            --nimbus-crun-binary "dist/input/nimbus-crun" \
            --version "${VERSION}" \
            --crun-version "${CRUN_VERSION}" \
            --arch "${ARCH}"

      - name: Upload package artifacts
        uses: actions/upload-artifact@v7
        with:
          name: linux-packages-${{ matrix.arch }}
          path: |
            dist/linux-packages/${{ matrix.arch }}/packages/*
            dist/linux-packages/${{ matrix.arch }}/manifests/*
