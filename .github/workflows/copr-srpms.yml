name: copr-srpms

on:
  workflow_call:
    inputs:
      nimbus_version:
        description: Release version or tag from nimbus/nimbus
        required: true
        type: string
      nimbus_crun_version:
        description: Release version or tag from nimbus/nimbus-crun
        required: false
        default: ""
        type: string
      copr_project:
        description: COPR project name (owner/project)
        required: false
        default: ""
        type: string
      submit_to_copr:
        description: Submit the generated SRPMs to COPR
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      nimbus_version:
        description: Release version or tag from nimbus/nimbus
        required: true
      nimbus_crun_version:
        description: Release version or tag from nimbus/nimbus-crun (defaults to packaging/linux-distribution-contract.env)
        required: false
        default: ""
      copr_project:
        description: COPR project name (owner/project, defaults to packaging/linux-distribution-contract.env)
        default: ""
        required: false
      submit_to_copr:
        description: Submit the generated SRPMs to COPR
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build Fedora/COPR SRPMs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Resolve Linux distribution contract
        id: contract
        shell: bash
        env:
          INPUT_NIMBUS_VERSION: ${{ inputs.nimbus_version }}
          INPUT_NIMBUS_CRUN_VERSION: ${{ inputs.nimbus_crun_version }}
          INPUT_COPR_PROJECT: ${{ inputs.copr_project }}
        run: |
          set -euo pipefail
          source packaging/linux-distribution-contract.env

          nimbus_version="${INPUT_NIMBUS_VERSION#v}"
          nimbus_crun_version="${INPUT_NIMBUS_CRUN_VERSION:-}"
          copr_project="${INPUT_COPR_PROJECT:-}"
          if [[ -z "${nimbus_crun_version}" ]]; then
            nimbus_crun_version="${NIMBUS_CRUN_VERSION}"
          fi
          if [[ -z "${copr_project}" ]]; then
            copr_project="${COPR_PROJECT}"
          fi
          nimbus_crun_version="${nimbus_crun_version#v}"

          {
            echo "nimbus_version=${nimbus_version}"
            echo "nimbus_release_tag=v${nimbus_version}"
            echo "nimbus_crun_version=${nimbus_crun_version}"
            echo "nimbus_crun_release_tag=v${nimbus_crun_version}"
            echo "copr_project=${copr_project}"
          } >> "${GITHUB_OUTPUT}"

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          mkdir -p dist/copr/assets
          gh release download "${{ steps.contract.outputs.nimbus_release_tag }}" \
            --repo nimbus/nimbus \
            --pattern 'nimbus_linux_x86_64.tar.gz' \
            --pattern 'nimbus_linux_arm64.tar.gz' \
            --dir dist/copr/assets
          gh release download "${{ steps.contract.outputs.nimbus_crun_release_tag }}" \
            --repo nimbus/nimbus-crun \
            --pattern 'nimbus-crun-linux-amd64' \
            --pattern 'nimbus-crun-linux-arm64' \
            --dir dist/copr/assets

      - name: Build SRPMs inside Fedora userspace
        run: |
          set -euo pipefail

          docker run --rm \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -v "$PWD:/work" \
            -w /work \
            fedora:42 \
            bash -lc '
              set -euo pipefail
              dnf install -y rpm-build tar gzip findutils

              bash scripts/build-fedora-release-srpms.sh \
                --output-dir /work/dist/copr/output \
                --nimbus-version "${{ steps.contract.outputs.nimbus_version }}" \
                --nimbus-linux-amd64-tarball /work/dist/copr/assets/nimbus_linux_x86_64.tar.gz \
                --nimbus-linux-arm64-tarball /work/dist/copr/assets/nimbus_linux_arm64.tar.gz \
                --nimbus-crun-version "${{ steps.contract.outputs.nimbus_crun_version }}" \
                --nimbus-crun-linux-amd64 /work/dist/copr/assets/nimbus-crun-linux-amd64 \
                --nimbus-crun-linux-arm64 /work/dist/copr/assets/nimbus-crun-linux-arm64

              chown -R "${HOST_UID}:${HOST_GID}" /work/dist/copr
            '

      - name: Upload SRPM artifact bundle
        uses: actions/upload-artifact@v7
        with:
          name: copr-srpms-${{ steps.contract.outputs.nimbus_version }}
          path: dist/copr/output
          compression-level: 0

      - name: Install copr-cli
        if: inputs.submit_to_copr
        run: |
          set -euo pipefail
          python3 -m pip install --user --upgrade pip
          python3 -m pip install --user copr-cli

      - name: Configure copr-cli
        if: inputs.submit_to_copr
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          set -euo pipefail

          if [[ -z "${COPR_CONFIG}" ]]; then
            echo "COPR_CONFIG secret must be configured when submit_to_copr=true" >&2
            exit 1
          fi

          mkdir -p ~/.config
          printf '%s\n' "${COPR_CONFIG}" > ~/.config/copr
          chmod 0600 ~/.config/copr
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Submit SRPMs to COPR
        if: inputs.submit_to_copr
        run: |
          set -euo pipefail

          copr-cli build "${{ steps.contract.outputs.copr_project }}" dist/copr/output/srpms/nimbus-*.src.rpm
          copr-cli build "${{ steps.contract.outputs.copr_project }}" dist/copr/output/srpms/nimbus-crun-*.src.rpm
