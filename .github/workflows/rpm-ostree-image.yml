name: rpm-ostree image

on:
  push:
    branches:
      - main
    paths:
      - "images/rpm-ostree/**"
      - ".github/workflows/rpm-ostree-image.yml"
  pull_request:
    paths:
      - "images/rpm-ostree/**"
      - ".github/workflows/rpm-ostree-image.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build rpm-ostree image
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        run: |
          image="ghcr.io/agentstation/rpm-ostree:fedora41"
          podman build \
            -t "${image}" \
            -f images/rpm-ostree/Containerfile \
            images/rpm-ostree
          if [[ "${{ github.ref }}" == 'refs/heads/main' ]]; then
            podman push "${image}"
          fi
