name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    # Weekly security audit — catches newly disclosed CVEs between PRs
    - cron: "0 8 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_PROFILE_DEV_DEBUG: "0"
  CARGO_PROFILE_TEST_DEBUG: "0"

permissions:
  contents: read

jobs:
  rust-format:
    name: Rust Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name != 'schedule'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  rust-clippy:
    name: Rust Clippy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name != 'schedule'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-ubuntu-stable-clippy
          cache-directories: ~/.cargo/.rusty_v8
          cache-on-failure: "true"

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  rust-runtime-tests:
    name: Rust Runtime Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name != 'schedule'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-ubuntu-stable-runtime
          cache-directories: ~/.cargo/.rusty_v8
          cache-on-failure: "true"

      - name: Run isolated runtime test lane
        # V8-sensitive runtime tests are subprocess-isolated in the harness, so
        # CI keeps a dedicated runtime lane instead of falling back to a global
        # single-thread workaround. The official Node compatibility corpus is a
        # conformance signal with its own dedicated workflow; keep PR
        # runtime tests focused on product runtime behavior and lightweight
        # manifest/unit checks.
        run: "cargo test -p nimbus-runtime -- --skip runtime::tests::node_compat::"

  rust-workspace-tests:
    name: Rust Workspace Tests
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name != 'schedule'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-ubuntu-stable-workspace
          cache-directories: ~/.cargo/.rusty_v8
          cache-on-failure: "true"

      - name: Run workspace test lane
        # Verification-harness corpus tests are ignored by default and run in
        # the dedicated harness matrix below, so this lane stays focused on the
        # main workspace suite outside the runtime crate.
        run: cargo test --workspace --exclude nimbus-runtime

  rust-gate-summary:
    name: Rust Gate Summary
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always() && github.event_name != 'schedule'
    needs:
      - rust-format
      - rust-clippy
      - rust-runtime-tests
      - rust-workspace-tests

    steps:
      - name: Check Rust gate results
        env:
          FORMAT_RESULT: ${{ needs['rust-format'].result }}
          CLIPPY_RESULT: ${{ needs['rust-clippy'].result }}
          RUNTIME_TEST_RESULT: ${{ needs['rust-runtime-tests'].result }}
          WORKSPACE_TEST_RESULT: ${{ needs['rust-workspace-tests'].result }}
        run: |
          printf 'format=%s\n' "${FORMAT_RESULT}"
          printf 'clippy=%s\n' "${CLIPPY_RESULT}"
          printf 'runtime-test=%s\n' "${RUNTIME_TEST_RESULT}"
          printf 'workspace-test=%s\n' "${WORKSPACE_TEST_RESULT}"
          test "${FORMAT_RESULT}" = success
          test "${CLIPPY_RESULT}" = success
          test "${RUNTIME_TEST_RESULT}" = success
          test "${WORKSPACE_TEST_RESULT}" = success

  harness-pr:
    name: Verification Harness (PR / ${{ matrix.surface }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        surface: [storage, engine, server, runtime]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-ubuntu-stable-harness-${{ matrix.surface }}
          cache-directories: ~/.cargo/.rusty_v8
          cache-on-failure: "true"

      - name: Run PR verification harness corpus
        run: bash scripts/verification-harness.sh pr ${{ matrix.surface }}

  harness-nightly:
    name: Verification Harness (Nightly / ${{ matrix.surface }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    if: github.event_name == 'schedule'
    strategy:
      fail-fast: false
      matrix:
        surface: [storage, engine, server, runtime]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-ubuntu-stable-harness-nightly-${{ matrix.surface }}
          cache-directories: ~/.cargo/.rusty_v8
          cache-on-failure: "true"

      - name: Run nightly verification harness corpus
        run: bash scripts/verification-harness.sh nightly ${{ matrix.surface }}

  deny:
    name: Rust Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-ubuntu-stable-deny
          cache-directories: ~/.cargo/.rusty_v8
          cache-on-failure: "true"

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Run cargo deny
        run: cargo deny check

  js:
    name: JavaScript Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name != 'schedule'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --workspaces --if-present

      - name: Test
        run: npm run test --workspaces --if-present

  proof-helpers:
    name: Proof Helper Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name != 'schedule'

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check helper script syntax
        run: |
          bash -n scripts/collect-sqlcipher-proof-bundles.sh
          bash -n scripts/collect-nimbus-machine-guest-proof.sh
          bash -n scripts/collect-nimbus-machine-service-proof.sh
          bash -n scripts/collect-nimbus-homebrew-cask-proof.sh
          bash -n scripts/verify-collect-sqlcipher-proof-bundles-helper.sh
          bash -n scripts/verify-nimbus-machine-guest-proof-helper.sh
          bash -n scripts/verify-nimbus-machine-service-proof-helper.sh
          bash -n scripts/verify-nimbus-homebrew-cask-proof-helper.sh
          bash -n scripts/install.sh
          bash -n scripts/verify-install.sh
          bash -n scripts/verify-install-helper.sh

      - name: Verify SQLCipher proof bundle collector helper
        run: bash scripts/verify-collect-sqlcipher-proof-bundles-helper.sh

      - name: Verify guest proof helper
        run: bash scripts/verify-nimbus-machine-guest-proof-helper.sh

      - name: Verify service proof helper
        run: bash scripts/verify-nimbus-machine-service-proof-helper.sh

      - name: Verify Homebrew cask proof helper
        run: bash scripts/verify-nimbus-homebrew-cask-proof-helper.sh

      - name: Verify install script helper
        run: bash scripts/verify-install-helper.sh

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name != 'schedule'
    env:
      NIMBUS_REQUIRE_EXTERNAL_PROVIDER_FIXTURES: "1"
      NIMBUS_TEST_POSTGRES_URL: host=127.0.0.1 port=5432 user=postgres password=postgres dbname=postgres
      NIMBUS_MYSQL_URL: mysql://root@127.0.0.1:3306/test
      NIMBUS_LIBSQL_URL: http://127.0.0.1:18080
      NIMBUS_LIBSQL_ADMIN_URL: http://127.0.0.1:18081
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
          MYSQL_DATABASE: test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-directories: ~/.cargo/.rusty_v8
          cache-on-failure: "true"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Start libsql provider fixture
        run: |
          docker run --detach \
            --name nimbus-libsql-coverage \
            --publish 18080:8080 \
            --publish 18081:8081 \
            --env SQLD_ADMIN_LISTEN_ADDR=0.0.0.0:8081 \
            ghcr.io/tursodatabase/libsql-server:latest \
            /bin/sqld --enable-namespaces --no-welcome

      - name: Wait for libsql provider fixture
        run: |
          for _ in {1..60}; do
            if curl -fsS -X POST http://127.0.0.1:18081/v1/namespaces/nimbus_coverage_probe/create \
              -H 'content-type: application/json' \
              --data '{}' >/dev/null; then
              curl -fsS -X DELETE http://127.0.0.1:18081/v1/namespaces/nimbus_coverage_probe >/dev/null || true
              exit 0
            fi
            sleep 1
          done
          docker logs nimbus-libsql-coverage
          exit 1

      - name: Generate coverage report
        # Coverage now provisions explicit external provider fixtures for
        # Postgres, MySQL, and libsql so provider suites run against the same
        # explicit env-driven fixture contract the tests already support.
        #
        # Keep runtime correctness in the blocking runtime test lane, the
        # verification harness matrix, and the scheduled/manual Node compatibility
        # evidence workflow. Do not run the V8/Node compatibility corpus again
        # under coverage instrumentation; it is a conformance signal, not useful
        # line-coverage input, and instrumentation has made it exceed the PR
        # coverage budget.
        #
        # Keep the instrumented workspace build serialized. GitHub-hosted Linux
        # runners have shown rust-lld bus errors when multiple large coverage
        # test binaries link in parallel.
        run: cargo llvm-cov -j 1 --workspace --exclude nimbus-runtime --lcov --output-path lcov.info

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: lcov.info

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
