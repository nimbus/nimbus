name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Mirror Podman's macOS packaging model: ship a pinned upstream gvproxy
  # binary inside the darwin archive instead of publishing gvproxy as a
  # separate Nimbus release asset or depending on Podman at runtime.
  GVPROXY_VERSION: v0.8.8

permissions:
  contents: read

jobs:
  verify-release-contract:
    name: Verify cross-repo release contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches workspace/package versions
        run: bash scripts/verify-release-version-contract.sh "${{ github.ref_name }}"

      - name: Require machine-os release app credentials
        env:
          MACHINE_OS_RELEASE_APP_ID: ${{ vars.MACHINE_OS_RELEASE_APP_ID }}
          MACHINE_OS_RELEASE_APP_PRIVATE_KEY: ${{ secrets.MACHINE_OS_RELEASE_APP_PRIVATE_KEY }}
        run: |
          if [[ -z "${MACHINE_OS_RELEASE_APP_ID}" ]]; then
            echo "MACHINE_OS_RELEASE_APP_ID must be configured so this workflow can dispatch and observe the matching nimbus-machine-os release workflow." >&2
            exit 1
          fi
          if [[ -z "${MACHINE_OS_RELEASE_APP_PRIVATE_KEY}" ]]; then
            echo "MACHINE_OS_RELEASE_APP_PRIVATE_KEY must be configured so this workflow can dispatch and observe the matching nimbus-machine-os release workflow." >&2
            exit 1
          fi

  build-linux-arm64:
    name: Build (aarch64-unknown-linux-gnu)
    needs: verify-release-contract
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        shell: bash
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Flush the previously poisoned release cache once, but continue
          # caching successful target/ artifacts for faster reruns. The real
          # fix is to avoid saving failed Windows V8 link states.
          key: release-aarch64-unknown-linux-gnu-v3
          cache-directories: ~/.cargo/.rusty_v8
          cache-on-failure: "false"

      - name: Build release binary
        run: cargo build --release -p nimbus-bin

      - name: Prove SQLCipher release lane
        shell: bash
        run: |
          mkdir -p dist
          bash scripts/verify-sqlcipher-proof.sh \
            --output-dir "dist/sqlcipher-proof-aarch64-unknown-linux-gnu" \
            cargo-lanes

      - name: Upload SQLCipher proof bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sqlcipher-proof-aarch64-unknown-linux-gnu
          path: dist/sqlcipher-proof-aarch64-unknown-linux-gnu
          compression-level: 0
          if-no-files-found: ignore

      - name: Package archive
        run: |
          tar czf nimbus_linux_arm64.tar.gz \
            -C target/release nimbus \
            -C ${{ github.workspace }} README.md LICENSE

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nimbus_linux_arm64
          path: nimbus_linux_arm64.tar.gz
          compression-level: 0

  build:
    name: Build (${{ matrix.target }})
    needs: verify-release-contract
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            os: linux
            arch: x86_64
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            os: darwin
            arch: arm64
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            arch: x86_64
            archive: zip
          # Windows ARM64 — V8 prebuilt available, but no free GitHub runner yet.
          # Uncomment when GitHub adds a free windows-arm64 runner.
          # See: https://github.com/actions/runner-images/issues
          # - target: aarch64-pc-windows-msvc
          #   runner: windows-11-arm
          #   os: windows
          #   arch: arm64
          #   archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        shell: bash
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Windows Perl
        if: matrix.os == 'windows'
        uses: shogo82148/actions-setup-perl@v1
        with:
          distribution: strawberry
          perl-version: "5.42"

      - name: Export Windows Perl for vendored OpenSSL
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $perlExe = (Get-Command perl).Source
          "PERL=$perlExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_SRC_PERL=$perlExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $perlExe -MLocale::Maketext::Simple -e "print qq(Strawberry Perl OK`n)"

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Flush the previously poisoned release caches once, then keep
          # successful target/ artifacts reusable. The key guardrail is that
          # failed release builds must not overwrite the cache with partial
          # Windows V8 state.
          key: release-${{ matrix.target }}-v3
          cache-directories: ~/.cargo/.rusty_v8
          cache-on-failure: "false"

      - name: Build release binary
        run: cargo build --release -p nimbus-bin

      - name: Prove SQLCipher release lane
        shell: bash
        run: |
          mkdir -p dist
          bash scripts/verify-sqlcipher-proof.sh \
            --output-dir "dist/sqlcipher-proof-${{ matrix.target }}" \
            cargo-lanes

      - name: Upload SQLCipher proof bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sqlcipher-proof-${{ matrix.target }}
          path: dist/sqlcipher-proof-${{ matrix.target }}
          compression-level: 0
          if-no-files-found: ignore

      - name: Bundle macOS machine helper
        if: matrix.os == 'darwin'
        run: |
          mkdir -p dist/libexec
          curl --fail -sSL --retry 5 \
            -o dist/libexec/gvproxy \
            "https://github.com/containers/gvisor-tap-vsock/releases/download/${GVPROXY_VERSION}/gvproxy-darwin"
          chmod 0755 dist/libexec/gvproxy

      - name: Package archive (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/release/nimbus dist/nimbus
          cp README.md LICENSE dist/
          if [[ "${{ matrix.os }}" == "darwin" ]]; then
            tar czf nimbus_${{ matrix.os }}_${{ matrix.arch }}.tar.gz \
              -C dist nimbus libexec README.md LICENSE
          else
          tar czf nimbus_${{ matrix.os }}_${{ matrix.arch }}.tar.gz \
              -C dist nimbus README.md LICENSE
          fi

      - name: Package archive (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/nimbus.exe, README.md, LICENSE `
            -DestinationPath nimbus_windows_x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nimbus_${{ matrix.os }}_${{ matrix.arch }}
          path: nimbus_${{ matrix.os }}_${{ matrix.arch }}.${{ matrix.archive }}
          compression-level: 0

  stage-machine-os:
    name: Stage machine-os bundle
    needs: build-linux-arm64
    # Keep this on a dedicated stable ref so machine-os workflow fixes do not
    # require raw-SHA repins in nimbus for every change.
    # Use github.run_id for the staged bundle handoff because the downstream
    # publish workflow must still find the artifact across reruns. Reserve
    # github.run_attempt for per-attempt diagnostics, not durable artifact
    # names.
    uses: nimbus/nimbus-machine-os/.github/workflows/build.yml@release-workflow-v1
    with:
      nimbus_version: ${{ github.ref_name }}
      nimbus_artifact_name: nimbus_linux_arm64
      create_release: false
      publish: false
      image_reference: "docker://ghcr.io/nimbus/nimbus-machine-os:${{ github.ref_name }}"
      stage_artifact_name: nimbus-machine-os-${{ github.run_id }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

  release-machine-os:
    name: Release machine-os
    needs: [build-linux-arm64, build, stage-machine-os]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Create machine-os dispatch token
        id: release_app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.MACHINE_OS_RELEASE_APP_ID }}
          private-key: ${{ secrets.MACHINE_OS_RELEASE_APP_PRIVATE_KEY }}
          owner: nimbus
          repositories: nimbus-machine-os
          permission-actions: write
          permission-contents: read

      - name: Dispatch machine-os publish workflow
        id: dispatch
        env:
          GH_TOKEN: ${{ steps.release_app_token.outputs.token }}
        run: |
          expected_title="Publish machine-os (${{ github.ref_name }}) from ${{ github.repository }}#${{ github.run_id }} (attempt ${{ github.run_attempt }})"
          cat > /tmp/machine-os-dispatch.json <<EOF
          {
            "ref": "release-workflow-v1",
            "inputs": {
              "source_repository": "${{ github.repository }}",
              "source_run_id": "${{ github.run_id }}",
              "source_run_attempt": "${{ github.run_attempt }}",
              "nimbus_version": "${{ github.ref_name }}",
              "release_tag": "${{ github.ref_name }}",
              "stage_artifact_name": "nimbus-machine-os-${{ github.run_id }}",
              "image_reference": "docker://ghcr.io/nimbus/nimbus-machine-os:${{ github.ref_name }}",
              "create_release": true
            }
          }
          EOF

          gh api \
            repos/nimbus/nimbus-machine-os/actions/workflows/publish.yml/dispatches \
            --method POST \
            --input /tmp/machine-os-dispatch.json

          echo "expected_title=${expected_title}" >> "${GITHUB_OUTPUT}"

      - name: Wait for machine-os publish workflow
        env:
          GH_TOKEN: ${{ steps.release_app_token.outputs.token }}
          EXPECTED_TITLE: ${{ steps.dispatch.outputs.expected_title }}
        run: |
          deadline=$(( $(date +%s) + 600 ))
          run_id=""

          while [[ $(date +%s) -lt "${deadline}" ]]; do
            run_id="$(
              gh run list \
                --repo nimbus/nimbus-machine-os \
                --workflow publish.yml \
                --branch release-workflow-v1 \
                --event workflow_dispatch \
                --limit 20 \
                --json databaseId,displayTitle \
                | jq -r --arg expected "${EXPECTED_TITLE}" '.[] | select(.displayTitle == $expected) | .databaseId' \
                | head -n1
            )"
            if [[ -n "${run_id}" ]]; then
              break
            fi
            sleep 5
          done

          if [[ -z "${run_id}" ]]; then
            echo "Failed to locate dispatched nimbus-machine-os publish run with title '${EXPECTED_TITLE}'." >&2
            gh run list \
              --repo nimbus/nimbus-machine-os \
              --workflow publish.yml \
              --branch release-workflow-v1 \
              --event workflow_dispatch \
              --limit 20
            exit 1
          fi

          echo "Watching nimbus-machine-os run ${run_id} (${EXPECTED_TITLE})"
          if ! gh run watch "${run_id}" --repo nimbus/nimbus-machine-os --exit-status; then
            gh run view "${run_id}" --repo nimbus/nimbus-machine-os --log-failed || true
            exit 1
          fi

  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-linux-arm64, build, release-machine-os]
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download nimbus build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: nimbus_*
          merge-multiple: true

      - name: Verify release archive layout
        run: bash scripts/verify-release-archive-layout.sh --artifacts-dir artifacts

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum nimbus_* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Generate release notes
        id: release-notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
          github_token: ${{ github.token }}
        env:
          OUTPUT: /tmp/RELEASE_NOTES.md

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          github_token: ${{ github.token }}
        env:
          OUTPUT: /tmp/CHANGELOG.md

      - name: Update CHANGELOG.md on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILE_SHA=$(gh api repos/${{ github.repository }}/contents/CHANGELOG.md \
            --jq '.sha' 2>/dev/null || echo "")

          ARGS=(
            repos/${{ github.repository }}/contents/CHANGELOG.md
            --method PUT
            --field message="docs: update CHANGELOG.md for ${{ github.ref_name }}"
            --field content="$(base64 -w0 /tmp/CHANGELOG.md)"
            --field branch="main"
          )
          if [ -n "$FILE_SHA" ]; then
            ARGS+=(--field sha="$FILE_SHA")
          fi

          gh api "${ARGS[@]}" --silent
        continue-on-error: true

      - name: Determine prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-alpha* ]] || [[ "$TAG" == *-beta* ]] || [[ "$TAG" == *-rc* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            artifacts/nimbus_*.tar.gz
            artifacts/nimbus_*.zip
            artifacts/checksums-sha256.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --notes-file /tmp/RELEASE_NOTES.md \
            ${{ steps.prerelease.outputs.flag }} \
            artifacts/*

      - name: Create Homebrew tap token
        id: homebrew_tap_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: nimbus
          repositories: homebrew-tap
          permission-contents: write

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ steps.homebrew_tap_token.outputs.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          SHA_DARWIN_ARM64=$(grep darwin_arm64 artifacts/checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep linux_arm64 artifacts/checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_X86_64=$(grep linux_x86_64 artifacts/checksums-sha256.txt | awk '{print $1}')

          cat > /tmp/nimbus.rb << CASKEOF
          cask "nimbus" do
            name "nimbus"
            desc "Self-hosted JavaScript backend runtime powered by V8"
            homepage "https://github.com/nimbus/nimbus"
            version "${VERSION}"

            livecheck do
              skip "Auto-generated on release."
            end

            binary "nimbus"

            on_macos do
              depends_on arch: :arm64
              depends_on macos: ">= :sonoma"
              depends_on formula: "slp/krunkit/krunkit"

              on_arm do
                url "https://github.com/nimbus/nimbus/releases/download/v#{version}/nimbus_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/nimbus/nimbus/releases/download/v#{version}/nimbus_linux_x86_64.tar.gz"
                sha256 "${SHA_LINUX_X86_64}"
              end
              on_arm do
                url "https://github.com/nimbus/nimbus/releases/download/v#{version}/nimbus_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
            end

            postflight do
              if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
                system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", staged_path.to_s], sudo: false
              end
            end

            caveats do
              "Nimbus has been installed!"
              ""
              "Quick start:"
              "  nimbus --help              # Show all commands"
              "  nimbus machine init        # Record the default macOS machine contract"
              "  nimbus serve               # Auto-start the machine if needed"
              ""
              "Documentation: https://github.com/nimbus/nimbus"
            end
          end

          CASKEOF

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' /tmp/nimbus.rb

          # Get current file SHA (if it exists) for the update API call
          FILE_SHA=$(gh api repos/nimbus/homebrew-tap/contents/Casks/nimbus.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            gh api repos/nimbus/homebrew-tap/contents/Casks/nimbus.rb \
              --method PUT \
              --field message="Update nimbus to ${VERSION}" \
              --field content="$(base64 -w0 /tmp/nimbus.rb)" \
              --field sha="$FILE_SHA" \
              --silent
          else
            gh api repos/nimbus/homebrew-tap/contents/Casks/nimbus.rb \
              --method PUT \
              --field message="Add nimbus cask at ${VERSION}" \
              --field content="$(base64 -w0 /tmp/nimbus.rb)" \
              --silent
          fi
        continue-on-error: true
