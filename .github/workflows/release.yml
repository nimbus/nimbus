name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify-release-contract:
    name: Verify cross-repo release contract
    runs-on: ubuntu-latest
    steps:
      - name: Require machine-os release app credentials
        env:
          MACHINE_OS_RELEASE_APP_ID: ${{ vars.MACHINE_OS_RELEASE_APP_ID }}
          MACHINE_OS_RELEASE_APP_PRIVATE_KEY: ${{ secrets.MACHINE_OS_RELEASE_APP_PRIVATE_KEY }}
        run: |
          if [[ -z "${MACHINE_OS_RELEASE_APP_ID}" ]]; then
            echo "MACHINE_OS_RELEASE_APP_ID must be configured so the reusable neovex-machine-os release workflow can mint a cross-repo GitHub App token." >&2
            exit 1
          fi
          if [[ -z "${MACHINE_OS_RELEASE_APP_PRIVATE_KEY}" ]]; then
            echo "MACHINE_OS_RELEASE_APP_PRIVATE_KEY must be configured so the reusable neovex-machine-os release workflow can mint a cross-repo GitHub App token." >&2
            exit 1
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: verify-release-contract
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            os: linux
            arch: x86_64
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            os: linux
            arch: arm64
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            os: darwin
            arch: arm64
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            arch: x86_64
            archive: zip
          # Windows ARM64 — V8 prebuilt available, but no free GitHub runner yet.
          # Uncomment when GitHub adds a free windows-arm64 runner.
          # See: https://github.com/actions/runner-images/issues
          # - target: aarch64-pc-windows-msvc
          #   runner: windows-11-arm
          #   os: windows
          #   arch: arm64
          #   archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        shell: bash
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          cache-on-failure: "true"

      - name: Build release binary
        run: cargo build --release -p neovex-bin

      - name: Package archive (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          tar czf neovex_${{ matrix.os }}_${{ matrix.arch }}.tar.gz \
            -C target/release neovex \
            -C ${{ github.workspace }} README.md LICENSE

      - name: Package archive (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/neovex.exe, README.md, LICENSE `
            -DestinationPath neovex_windows_x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: neovex_${{ matrix.os }}_${{ matrix.arch }}
          path: neovex_${{ matrix.os }}_${{ matrix.arch }}.${{ matrix.archive }}

  stage-machine-os:
    name: Stage machine-os bundle
    needs: build
    uses: agentstation/neovex-machine-os/.github/workflows/build.yml@51aca91fb9edbf370745dea1b0ecae8f269111f2
    with:
      neovex_version: ${{ github.ref_name }}
      neovex_artifact_name: neovex_linux_arm64
      create_release: false
      publish: false
      image_reference: "docker://ghcr.io/agentstation/neovex-machine-os:${{ github.ref_name }}"
      stage_artifact_name: neovex-machine-os-${{ github.run_id }}-${{ github.run_attempt }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, stage-machine-os]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download neovex build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: neovex_*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum neovex_* > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Generate release notes
        id: release-notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
          github_token: ${{ github.token }}
        env:
          OUTPUT: /tmp/RELEASE_NOTES.md

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          github_token: ${{ github.token }}
        env:
          OUTPUT: /tmp/CHANGELOG.md

      - name: Update CHANGELOG.md on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILE_SHA=$(gh api repos/${{ github.repository }}/contents/CHANGELOG.md \
            --jq '.sha' 2>/dev/null || echo "")

          ARGS=(
            repos/${{ github.repository }}/contents/CHANGELOG.md
            --method PUT
            --field message="docs: update CHANGELOG.md for ${{ github.ref_name }}"
            --field content="$(base64 -w0 /tmp/CHANGELOG.md)"
            --field branch="main"
          )
          if [ -n "$FILE_SHA" ]; then
            ARGS+=(--field sha="$FILE_SHA")
          fi

          gh api "${ARGS[@]}" --silent
        continue-on-error: true

      - name: Determine prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-alpha* ]] || [[ "$TAG" == *-beta* ]] || [[ "$TAG" == *-rc* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            artifacts/neovex_*.tar.gz
            artifacts/neovex_*.zip
            artifacts/checksums-sha256.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --notes-file /tmp/RELEASE_NOTES.md \
            ${{ steps.prerelease.outputs.flag }} \
            artifacts/*

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          SHA_DARWIN_ARM64=$(grep darwin_arm64 artifacts/checksums-sha256.txt | awk '{print $1}')
          SHA_DARWIN_X86_64=$(grep darwin_x86_64 artifacts/checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep linux_arm64 artifacts/checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_X86_64=$(grep linux_x86_64 artifacts/checksums-sha256.txt | awk '{print $1}')

          cat > /tmp/neovex.rb << CASKEOF
          cask "neovex" do
            name "neovex"
            desc "Self-hosted JavaScript backend runtime powered by V8"
            homepage "https://github.com/agentstation/neovex"
            version "${VERSION}"

            livecheck do
              skip "Auto-generated on release."
            end

            binary "neovex"

            on_macos do
              on_intel do
                url "https://github.com/agentstation/neovex/releases/download/v#{version}/neovex_darwin_x86_64.tar.gz"
                sha256 "${SHA_DARWIN_X86_64}"
              end
              on_arm do
                url "https://github.com/agentstation/neovex/releases/download/v#{version}/neovex_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/agentstation/neovex/releases/download/v#{version}/neovex_linux_x86_64.tar.gz"
                sha256 "${SHA_LINUX_X86_64}"
              end
              on_arm do
                url "https://github.com/agentstation/neovex/releases/download/v#{version}/neovex_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
            end

            postflight do
              if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
                system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/neovex"], sudo: false
              end
            end

            caveats do
              "Neovex has been installed!"
              ""
              "Quick start:"
              "  neovex --help              # Show all commands"
              "  neovex --port 8080         # Start server on port 8080"
              ""
              "Documentation: https://github.com/agentstation/neovex"
            end
          end

          CASKEOF

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' /tmp/neovex.rb

          # Get current file SHA (if it exists) for the update API call
          FILE_SHA=$(gh api repos/agentstation/homebrew-tap/contents/Casks/neovex.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            gh api repos/agentstation/homebrew-tap/contents/Casks/neovex.rb \
              --method PUT \
              --field message="Update neovex to ${VERSION}" \
              --field content="$(base64 -w0 /tmp/neovex.rb)" \
              --field sha="$FILE_SHA" \
              --silent
          else
            gh api repos/agentstation/homebrew-tap/contents/Casks/neovex.rb \
              --method PUT \
              --field message="Add neovex cask at ${VERSION}" \
              --field content="$(base64 -w0 /tmp/neovex.rb)" \
              --silent
          fi
        continue-on-error: true

  release-machine-os:
    name: Release machine-os
    needs: [build, stage-machine-os, release]
    uses: agentstation/neovex-machine-os/.github/workflows/publish.yml@51aca91fb9edbf370745dea1b0ecae8f269111f2
    with:
      neovex_version: ${{ github.ref_name }}
      release_tag: ${{ github.ref_name }}
      create_release: true
      image_reference: "docker://ghcr.io/agentstation/neovex-machine-os:${{ github.ref_name }}"
      stage_artifact_name: neovex-machine-os-${{ github.run_id }}-${{ github.run_attempt }}
      release_app_id: ${{ vars.MACHINE_OS_RELEASE_APP_ID }}
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    secrets:
      MACHINE_OS_RELEASE_APP_PRIVATE_KEY: ${{ secrets.MACHINE_OS_RELEASE_APP_PRIVATE_KEY }}
