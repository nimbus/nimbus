name: Release

on:
  push:
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  # Force Cargo through the git CLI so GitHub-hosted Windows runners can use
  # Git's long-path support for large Deno-family dependency submodules.
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Mirror Podman's macOS packaging model: ship a pinned upstream gvproxy
  # binary inside the darwin archive instead of publishing gvproxy as a
  # separate Nimbus release asset or depending on Podman at runtime.
  GVPROXY_VERSION: v0.8.8
  # Dedicated machine-os source ref used by the release graph. Nimbus stages
  # the bootc artifact as soon as the Linux arm64 binary exists, then dispatches
  # the machine-os repository to publish from its own package context after all
  # CLI release targets pass.
  MACHINE_OS_SOURCE_REF: main
  MACHINE_OS_REPOSITORY: nimbus/machine-os
  MACHINE_OS_PACKAGE: ghcr.io/nimbus/machine-os
  MACHINE_OS_STAGED_ARTIFACT: nimbus-machine-os-arm64-staged
  MACHINE_OS_RELEASE_ARTIFACT: machine-os-arm64-release
  MACHINE_OS_FEDORA_BOOTC_IMAGE: quay.io/fedora/fedora-bootc@sha256:5f2aa40538a71e32eba8dcdf9059dda10600bac68acef4588cb1aecedcfc6fe2
  MACHINE_OS_BOOTC_IMAGE_BUILDER: quay.io/centos-bootc/bootc-image-builder@sha256:754fc17718f977313885379e2c779066aba7d15af88fe04b486baec74759f574

permissions:
  contents: read

jobs:
  verify-release-contract:
    name: Verify release contract
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Verify tag matches workspace/package versions
        run: bash scripts/verify-release-version-contract.sh "${{ github.ref_name }}"

      - name: Verify machine-os release default gate helper
        run: bash scripts/verify-machine-os-release-default-gate-helper.sh

      - name: Verify bootc default promotion gate helper
        run: bash scripts/verify-bootc-default-promotion-gate-helper.sh

      - name: Verify machine-os release ref contract
        run: bash scripts/verify-machine-os-release-ref-contract.sh

      - name: Verify machine-os release ref contract helper
        run: bash scripts/verify-machine-os-release-ref-contract-helper.sh

      - name: Require machine-os release app credentials
        env:
          MACHINE_OS_RELEASE_APP_CLIENT_ID: ${{ vars.MACHINE_OS_RELEASE_APP_CLIENT_ID }}
          MACHINE_OS_RELEASE_APP_PRIVATE_KEY: ${{ secrets.MACHINE_OS_RELEASE_APP_PRIVATE_KEY }}
        run: |
          if [[ -z "${MACHINE_OS_RELEASE_APP_CLIENT_ID}" ]]; then
            echo "MACHINE_OS_RELEASE_APP_CLIENT_ID must be configured so this workflow can check out machine-os and dispatch the matching machine-os release." >&2
            exit 1
          fi
          if [[ -z "${MACHINE_OS_RELEASE_APP_PRIVATE_KEY}" ]]; then
            echo "MACHINE_OS_RELEASE_APP_PRIVATE_KEY must be configured so this workflow can check out machine-os and dispatch the matching machine-os release." >&2
            exit 1
          fi

  build-linux-arm64:
    name: Build (aarch64-unknown-linux-gnu)
    needs: verify-release-contract
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        shell: bash
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Cache build outputs only. Toolchain-managed executables under
          # ~/.cargo/bin must not be restored over the runner's cargo shim.
          key: release-aarch64-unknown-linux-gnu-v4
          cache-directories: ~/.cargo/.rusty_v8
          cache-on-failure: "false"
          cache-bin: "false"

      - name: Build release binary
        run: cargo build --release -p nimbus-bin

      - name: Prove SQLCipher release lane
        shell: bash
        run: |
          mkdir -p dist
          bash scripts/verify-sqlcipher-proof.sh \
            --output-dir "dist/sqlcipher-proof-aarch64-unknown-linux-gnu" \
            cargo-lanes

      - name: Upload SQLCipher proof bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sqlcipher-proof-aarch64-unknown-linux-gnu
          path: dist/sqlcipher-proof-aarch64-unknown-linux-gnu
          compression-level: 0
          if-no-files-found: ignore

      - name: Package archive
        run: |
          tar czf nimbus_linux_arm64.tar.gz \
            -C target/release nimbus \
            -C ${{ github.workspace }} README.md LICENSE

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nimbus_linux_arm64
          path: nimbus_linux_arm64.tar.gz
          compression-level: 0

  build:
    name: Build (${{ matrix.target }})
    needs: verify-release-contract
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            os: linux
            arch: x86_64
            archive: tar.gz
          - target: aarch64-apple-darwin
            runner: macos-14
            os: darwin
            arch: arm64
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            os: windows
            arch: x86_64
            archive: zip
          # Windows ARM64 — V8 prebuilt available, but no free GitHub runner yet.
          # Uncomment when GitHub adds a free windows-arm64 runner.
          # See: https://github.com/actions/runner-images/issues
          # - target: aarch64-pc-windows-msvc
          #   runner: windows-11-arm
          #   os: windows
          #   arch: arm64
          #   archive: zip

    steps:
      - uses: actions/checkout@v6

      - name: Configure googlesource credentials
        if: env.GOOGLESOURCE_COOKIE != ''
        env:
          GOOGLESOURCE_COOKIE: ${{ secrets.GOOGLESOURCE_COOKIE }}
        shell: bash
        run: |
          touch ~/.gitcookies && chmod 0600 ~/.gitcookies
          git config --global http.cookiefile ~/.gitcookies
          echo ".googlesource.com	TRUE	/	TRUE	2147483647	o	${GOOGLESOURCE_COOKIE}" >> ~/.gitcookies
          git config --global url."https://chromium.googlesource.com/a/".insteadOf "https://chromium.googlesource.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Windows Perl
        if: matrix.os == 'windows'
        uses: shogo82148/actions-setup-perl@v1
        with:
          distribution: strawberry
          perl-version: "5.42"

      - name: Export Windows Perl for vendored OpenSSL
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $perlExe = (Get-Command perl).Source
          "PERL=$perlExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "OPENSSL_SRC_PERL=$perlExe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          & $perlExe -MLocale::Maketext::Simple -e "print qq(Strawberry Perl OK`n)"

      - name: Enable Windows long paths for Cargo git dependencies
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          git config --global core.longpaths true

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          # Cache build outputs only. Toolchain-managed executables under
          # ~/.cargo/bin must not be restored over the runner's cargo shim.
          key: release-${{ matrix.target }}-v4
          cache-directories: ~/.cargo/.rusty_v8
          cache-on-failure: "false"
          cache-bin: "false"

      - name: Build release binary
        run: cargo build --release -p nimbus-bin

      - name: Prove SQLCipher release lane
        shell: bash
        run: |
          mkdir -p dist
          bash scripts/verify-sqlcipher-proof.sh \
            --output-dir "dist/sqlcipher-proof-${{ matrix.target }}" \
            cargo-lanes

      - name: Upload SQLCipher proof bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sqlcipher-proof-${{ matrix.target }}
          path: dist/sqlcipher-proof-${{ matrix.target }}
          compression-level: 0
          if-no-files-found: ignore

      - name: Bundle macOS machine helper
        if: matrix.os == 'darwin'
        run: |
          mkdir -p dist/libexec
          curl --fail -sSL --retry 5 \
            -o dist/libexec/gvproxy \
            "https://github.com/containers/gvisor-tap-vsock/releases/download/${GVPROXY_VERSION}/gvproxy-darwin"
          chmod 0755 dist/libexec/gvproxy

      - name: Package archive (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist
          cp target/release/nimbus dist/nimbus
          cp README.md LICENSE dist/
          if [[ "${{ matrix.os }}" == "darwin" ]]; then
            tar czf nimbus_${{ matrix.os }}_${{ matrix.arch }}.tar.gz \
              -C dist nimbus libexec README.md LICENSE
          else
          tar czf nimbus_${{ matrix.os }}_${{ matrix.arch }}.tar.gz \
              -C dist nimbus README.md LICENSE
          fi

      - name: Package archive (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path target/release/nimbus.exe, README.md, LICENSE `
            -DestinationPath nimbus_windows_x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nimbus_${{ matrix.os }}_${{ matrix.arch }}
          path: nimbus_${{ matrix.os }}_${{ matrix.arch }}.${{ matrix.archive }}
          compression-level: 0

  build-machine-os:
    name: Build machine-os
    needs: [build-linux-arm64]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 150
    outputs:
      machine_os_source_revision: ${{ steps.machine_os_source.outputs.revision }}
    permissions:
      contents: read
    steps:
      - name: Check out Nimbus repository
        uses: actions/checkout@v6

      - name: Create machine-os source token
        id: machine_os_source_token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ vars.MACHINE_OS_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.MACHINE_OS_RELEASE_APP_PRIVATE_KEY }}
          owner: nimbus
          repositories: machine-os
          permission-contents: read

      - name: Check out machine-os repository
        uses: actions/checkout@v6
        with:
          repository: ${{ env.MACHINE_OS_REPOSITORY }}
          ref: ${{ env.MACHINE_OS_SOURCE_REF }}
          path: machine-os
          token: ${{ steps.machine_os_source_token.outputs.token }}

      - name: Initialize machine-os directories
        run: |
          {
            echo "MACHINE_OS_DIR=${GITHUB_WORKSPACE}/machine-os"
            echo "BUILD_OUTPUT_DIR=${RUNNER_TEMP}/nimbus-machine-os"
            echo "LAYOUT_DIR=${RUNNER_TEMP}/nimbus-machine-os-layout"
            echo "STAGE_DIR=${RUNNER_TEMP}/nimbus-machine-os-staged"
          } >> "${GITHUB_ENV}"
          mkdir -p \
            "${RUNNER_TEMP}/nimbus-machine-os" \
            "${RUNNER_TEMP}/nimbus-machine-os-layout" \
            "${RUNNER_TEMP}/nimbus-machine-os-staged"

      - name: Download Linux arm64 nimbus artifact
        uses: actions/download-artifact@v8
        with:
          name: nimbus_linux_arm64
          path: ${{ runner.temp }}/nimbus-linux-arm64

      - name: Extract nimbus binary
        run: |
          tar xzf "${RUNNER_TEMP}/nimbus-linux-arm64/nimbus_linux_arm64.tar.gz" \
            -C "${RUNNER_TEMP}/nimbus-linux-arm64"
          chmod +x "${RUNNER_TEMP}/nimbus-linux-arm64/nimbus"
          echo "NIMBUS_LINUX_ARM64_BINARY=${RUNNER_TEMP}/nimbus-linux-arm64/nimbus" >> "${GITHUB_ENV}"

      - name: Resolve machine-os source revision
        id: machine_os_source
        run: |
          revision="$(git -C "${MACHINE_OS_DIR}" rev-parse HEAD)"
          echo "revision=${revision}" >> "${GITHUB_OUTPUT}"
          echo "machine-os source revision: ${revision}"

      - name: Verify build-host requirements
        run: |
          command -v sudo
          command -v git
          command -v podman
          command -v gzip
          command -v sha256sum
          sudo -n true

      - name: Restore container image cache
        id: image-cache
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/image-cache
          key: machine-os-base-image-arm64-${{ hashFiles('machine-os/image/Containerfile', 'machine-os/image/build-common.sh', 'machine-os/image/build.sh') }}
          restore-keys: |
            machine-os-base-image-arm64-

      - name: Load cached container images
        run: |
          cache_dir="${RUNNER_TEMP}/image-cache"
          for archive in "${cache_dir}"/*.tar; do
            if [[ -f "${archive}" ]]; then
              echo "Loading $(basename "${archive}")..."
              sudo podman load -i "${archive}"
            fi
          done

      - name: Pull base images
        run: |
          sudo podman pull "${MACHINE_OS_FEDORA_BOOTC_IMAGE}" &
          fedora_pid=$!
          sudo podman pull "${MACHINE_OS_BOOTC_IMAGE_BUILDER}" &
          bib_pid=$!
          wait "${fedora_pid}"
          wait "${bib_pid}"

      - name: Build machine-os guest image
        run: |
          cd "${MACHINE_OS_DIR}"
          sudo bash scripts/build.sh \
            --nimbus-binary "${NIMBUS_LINUX_ARM64_BINARY}" \
            --nimbus-version "${{ github.ref_name }}" \
            --source-revision "${{ steps.machine_os_source.outputs.revision }}" \
            --output-dir "${BUILD_OUTPUT_DIR}"
          sudo chown -R "$(id -u):$(id -g)" \
            "${BUILD_OUTPUT_DIR}"

      - name: Save base image to cache
        if: steps.image-cache.outputs.cache-hit != 'true'
        run: |
          cache_dir="${RUNNER_TEMP}/image-cache"
          mkdir -p "${cache_dir}"
          sudo podman save -o "${cache_dir}/fedora-bootc-base.tar" "${MACHINE_OS_FEDORA_BOOTC_IMAGE}"
          sudo chown -R "$(id -u):$(id -g)" "${cache_dir}"

      - name: Package raw-disk OCI layout
        run: |
          cd "${MACHINE_OS_DIR}"
          bash scripts/package-oci.sh \
            --build-output-dir "${BUILD_OUTPUT_DIR}" \
            --image-reference "docker://${{ env.MACHINE_OS_PACKAGE }}:${{ github.ref_name }}" \
            --layout-dir "${LAYOUT_DIR}" \
            --arch arm64 \
            --source-repository-url "https://github.com/${{ env.MACHINE_OS_REPOSITORY }}" \
            --source-revision "${{ steps.machine_os_source.outputs.revision }}" \
            --attestation-repository "${{ env.MACHINE_OS_REPOSITORY }}" \
            --nimbus-version "${{ github.ref_name }}"

      - name: Assemble staged machine-os artifact
        run: |
          rm -rf "${STAGE_DIR}"
          mkdir -p "${STAGE_DIR}/build-output" "${STAGE_DIR}/layout"
          cp \
            "${BUILD_OUTPUT_DIR}/summary.txt" \
            "${BUILD_OUTPUT_DIR}/nimbus-machine-os.ociarchive" \
            "${BUILD_OUTPUT_DIR}/nimbus-machine-os.raw.gz" \
            "${BUILD_OUTPUT_DIR}/nimbus-machine-os.sbom.cdx.json" \
            "${STAGE_DIR}/build-output/"
          cp -R "${LAYOUT_DIR}/." "${STAGE_DIR}/layout/"

      - name: Upload staged machine-os artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MACHINE_OS_STAGED_ARTIFACT }}
          if-no-files-found: error
          path: ${{ env.STAGE_DIR }}/**
          compression-level: 0

  publish-machine-os:
    name: Publish machine-os
    needs: [build-linux-arm64, build, build-machine-os]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    permissions:
      contents: read
    steps:
      - name: Check out Nimbus repository
        uses: actions/checkout@v6

      - name: Create machine-os workflow token
        id: machine_os_workflow_token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ vars.MACHINE_OS_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.MACHINE_OS_RELEASE_APP_PRIVATE_KEY }}
          owner: nimbus
          repositories: machine-os
          permission-actions: write
          permission-contents: read

      - name: Verify dispatch-host requirements
        run: |
          command -v gh
          command -v jq

      - name: Dispatch machine-os publish workflow
        id: machine_os_publish
        env:
          GH_TOKEN: ${{ steps.machine_os_workflow_token.outputs.token }}
          MACHINE_OS_SOURCE_REVISION: ${{ needs.build-machine-os.outputs.machine_os_source_revision }}
        run: |
          dispatch_response="$(
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2026-03-10" \
              "repos/${MACHINE_OS_REPOSITORY}/actions/workflows/publish.yml/dispatches" \
              -f ref="${MACHINE_OS_SOURCE_REF}" \
              -F return_run_details=true \
              -f "inputs[source_repository]=${GITHUB_REPOSITORY}" \
              -f "inputs[source_run_id]=${GITHUB_RUN_ID}" \
              -f "inputs[source_run_attempt]=${GITHUB_RUN_ATTEMPT}" \
              -f "inputs[nimbus_version]=${GITHUB_REF_NAME}" \
              -f "inputs[release_tag]=${GITHUB_REF_NAME}" \
              -f "inputs[stage_artifact_name]=${MACHINE_OS_STAGED_ARTIFACT}" \
              -f "inputs[image_reference]=docker://${MACHINE_OS_PACKAGE}:${GITHUB_REF_NAME}" \
              -f "inputs[machine_os_source_revision]=${MACHINE_OS_SOURCE_REVISION}" \
              -F "inputs[create_release]=true"
          )"

          run_id="$(jq -r '.workflow_run_id // empty' <<<"${dispatch_response}")"
          run_url="$(jq -r '.html_url // .run_url // empty' <<<"${dispatch_response}")"
          if [[ -z "${run_id}" ]]; then
            echo "workflow dispatch did not return a machine-os publish run id: ${dispatch_response}" >&2
            exit 66
          fi

          echo "run_id=${run_id}" >> "${GITHUB_OUTPUT}"
          echo "run_url=${run_url}" >> "${GITHUB_OUTPUT}"
          echo "machine-os publish run: ${run_url}"

      - name: Wait for machine-os publish workflow
        env:
          GH_TOKEN: ${{ steps.machine_os_workflow_token.outputs.token }}
        run: |
          run_id="${{ steps.machine_os_publish.outputs.run_id }}"
          for _ in {1..180}; do
            run_json="$(gh run view "${run_id}" --repo "${MACHINE_OS_REPOSITORY}" --json status,conclusion,url)"
            status="$(jq -r '.status' <<<"${run_json}")"
            conclusion="$(jq -r '.conclusion // empty' <<<"${run_json}")"
            url="$(jq -r '.url' <<<"${run_json}")"

            if [[ "${status}" == "completed" ]]; then
              if [[ "${conclusion}" == "success" ]]; then
                echo "machine-os publish succeeded: ${url}"
                exit 0
              fi
              echo "machine-os publish failed with conclusion ${conclusion}: ${url}" >&2
              exit 65
            fi

            sleep 20
          done

          echo "timed out waiting for machine-os publish run ${run_id}" >&2
          exit 66

      - name: Download machine-os release bundle
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.MACHINE_OS_RELEASE_ARTIFACT }}
          path: ${{ runner.temp }}/machine-os-release
          repository: ${{ env.MACHINE_OS_REPOSITORY }}
          run-id: ${{ steps.machine_os_publish.outputs.run_id }}
          github-token: ${{ steps.machine_os_workflow_token.outputs.token }}

      - name: Verify machine-os release default gate
        run: |
          bash scripts/verify-machine-os-release-default-gate.sh \
            --release-dir "${RUNNER_TEMP}/machine-os-release" \
            --expected-tag "${{ github.ref_name }}" \
            --require-ghcr-public

      - name: Upload machine-os release bundle
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.MACHINE_OS_RELEASE_ARTIFACT }}
          if-no-files-found: error
          path: ${{ runner.temp }}/machine-os-release/**
          compression-level: 0

  release:
    name: Create Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build-linux-arm64, build, publish-machine-os]
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download nimbus build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: nimbus_*
          merge-multiple: true

      - name: Verify release archive layout
        run: bash scripts/verify-release-archive-layout.sh --artifacts-dir artifacts

      - name: Stage install script alongside release artifacts
        run: |
          cp scripts/install.sh artifacts/install.sh
          chmod 0755 artifacts/install.sh

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum nimbus_* install.sh > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Generate release notes
        id: release-notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
          github_token: ${{ github.token }}
        env:
          OUTPUT: /tmp/RELEASE_NOTES.md

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          github_token: ${{ github.token }}
        env:
          OUTPUT: /tmp/CHANGELOG.md

      - name: Update CHANGELOG.md on main
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILE_SHA=$(gh api repos/${{ github.repository }}/contents/CHANGELOG.md \
            --jq '.sha' 2>/dev/null || echo "")

          ARGS=(
            repos/${{ github.repository }}/contents/CHANGELOG.md
            --method PUT
            --field message="docs: update CHANGELOG.md for ${{ github.ref_name }}"
            --field content="$(base64 -w0 /tmp/CHANGELOG.md)"
            --field branch="main"
          )
          if [ -n "$FILE_SHA" ]; then
            ARGS+=(--field sha="$FILE_SHA")
          fi

          gh api "${ARGS[@]}" --silent
        continue-on-error: true

      - name: Determine prerelease
        id: prerelease
        run: |
          TAG="${{ github.ref_name }}"
          if [[ "$TAG" == *-alpha* ]] || [[ "$TAG" == *-beta* ]] || [[ "$TAG" == *-rc* ]]; then
            echo "flag=--prerelease" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-path: |
            artifacts/nimbus_*.tar.gz
            artifacts/nimbus_*.zip
            artifacts/install.sh
            artifacts/checksums-sha256.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --notes-file /tmp/RELEASE_NOTES.md \
            ${{ steps.prerelease.outputs.flag }} \
            artifacts/*

      - name: Create Homebrew tap token
        id: homebrew_tap_token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ vars.HOMEBREW_TAP_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: nimbus
          repositories: homebrew-tap
          permission-contents: write

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ steps.homebrew_tap_token.outputs.token }}
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"

          SHA_DARWIN_ARM64=$(grep darwin_arm64 artifacts/checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_ARM64=$(grep linux_arm64 artifacts/checksums-sha256.txt | awk '{print $1}')
          SHA_LINUX_X86_64=$(grep linux_x86_64 artifacts/checksums-sha256.txt | awk '{print $1}')

          cat > /tmp/nimbus.rb << CASKEOF
          cask "nimbus" do
            name "nimbus"
            desc "Self-hosted JavaScript backend runtime powered by V8"
            homepage "https://github.com/nimbus/nimbus"
            version "${VERSION}"

            livecheck do
              skip "Auto-generated on release."
            end

            binary "nimbus"

            on_macos do
              depends_on arch: :arm64
              depends_on macos: ">= :sonoma"
              depends_on formula: "slp/krunkit/krunkit"

              on_arm do
                url "https://github.com/nimbus/nimbus/releases/download/v#{version}/nimbus_darwin_arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/nimbus/nimbus/releases/download/v#{version}/nimbus_linux_x86_64.tar.gz"
                sha256 "${SHA_LINUX_X86_64}"
              end
              on_arm do
                url "https://github.com/nimbus/nimbus/releases/download/v#{version}/nimbus_linux_arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              end
            end

            postflight do
              if system_command("/usr/bin/xattr", args: ["-h"]).exit_status == 0
                system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", staged_path.to_s], sudo: false
              end
            end

            caveats do
              "Nimbus has been installed!"
              ""
              "Quick start:"
              "  nimbus --help              # Show all commands"
              "  nimbus machine init        # Record the default macOS machine contract"
              "  nimbus serve               # Auto-start the machine if needed"
              ""
              "Documentation: https://github.com/nimbus/nimbus"
            end
          end

          CASKEOF

          # Strip leading whitespace from heredoc
          sed -i 's/^          //' /tmp/nimbus.rb

          # Get current file SHA (if it exists) for the update API call
          FILE_SHA=$(gh api repos/nimbus/homebrew-tap/contents/Casks/nimbus.rb --jq '.sha' 2>/dev/null || echo "")

          if [ -n "$FILE_SHA" ]; then
            gh api repos/nimbus/homebrew-tap/contents/Casks/nimbus.rb \
              --method PUT \
              --field message="Update nimbus to ${VERSION}" \
              --field content="$(base64 -w0 /tmp/nimbus.rb)" \
              --field sha="$FILE_SHA" \
              --silent
          else
            gh api repos/nimbus/homebrew-tap/contents/Casks/nimbus.rb \
              --method PUT \
              --field message="Add nimbus cask at ${VERSION}" \
              --field content="$(base64 -w0 /tmp/nimbus.rb)" \
              --silent
          fi
        continue-on-error: true
