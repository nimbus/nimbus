version: 2

updates:
  # Rust dependencies (Cargo.toml / Cargo.lock)
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      rust-dependencies:
        patterns:
          - "*"

  # GitHub Actions versions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"

  # npm dependencies (package.json / package-lock.json)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      npm-dependencies:
        patterns:
          - "*"
